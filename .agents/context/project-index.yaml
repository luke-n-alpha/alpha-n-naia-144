$schema_version: "0.1"
project: alpha-n-naia-144
doc_version: "Draft v0.1"
doc_date: "2026-05-21"

entry_points:
  human:
    - README.md
  multi_tool:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
  ai_sot:
    - .agents/context/agents-rules.json

mandatory_reads:
  - path: docs/00-charter/charter.md
    purpose: 비전·범위·제약·일정·위험·결재 권한
  - path: docs/00-charter/ai-roles.md
    purpose: AI 역할 분담 + RACI 매트릭스
  - path: docs/00-charter/sdlc-process.md
    purpose: SDLC 게이트 정의·검토 절차

sdlc_documents:
  gate_0_charter:
    dir: docs/00-charter/
    files:
      - charter.md
      - ai-roles.md
      - sdlc-process.md
    status: in_progress

  gate_1_requirements:
    dir: docs/01-requirements/
    planned_files:
      - functional.md          # 기능 요구사항
      - non-functional.md      # 비기능 (사이즈·성능·호환성)
      - user-scenarios.md      # 사용자 시나리오 (게임 흐름)
      - contest-rules.md       # 공모전 규정 재확인
      - license.md             # 라이선스 결정
    status: pending

  gate_2_design:
    dir: docs/02-design/
    planned_files:
      - architecture.md        # 4계층 아키텍처
      - jamo-mapping.md        # 한글 자모 픽셀↔글자 매핑
      - terminal-engine.md     # 자체 터미널 명세
      - font-renderer.md       # 비트맵 폰트 렌더러 명세
      - dual-render.md         # 글자/픽셀 듀얼 모드
      - size-budget.md         # 1.44MB 항목별 예산
      - game-design.md         # 게임 디자인 (서사·NPC·룰)
      - characters.md          # cafelua, naia 고양이 캐릭터
      - poc-jamo-frames.md     # 자모 매핑 PoC (정지 5장)
    status: pending

  gate_3_engine_core:
    dir: docs/03-implementation/
    planned_files:
      - engine.md              # 엔진 구현 노트
    code_dir: src/engine/
    status: pending

  gate_4_game_content:
    dir: docs/03-implementation/
    planned_files:
      - game.md
    code_dir: src/game/
    assets_dir: assets/scenarios/
    status: pending

  gate_5_testing:
    dir: docs/04-testing/
    planned_files:
      - test-plan.md
      - results.md
      - size-final.md
    code_dir: tests/
    status: pending

  gate_6_deployment:
    dir: docs/05-deployment/
    planned_files:
      - disk-image.md
      - submission.md
      - readme-bilingual.md
    artifact: build/disk.img
    status: pending

  gate_7_postrelease:
    dir: docs/06-maintenance/
    planned_files:
      - open-source-launch.md
      - retrospective.md
    status: pending

ai_progress_dirs:
  active: .agents/progress/
  archive: .agents/progress/archive/
  reviews_raw: .agents/progress/reviews/
  decisions: .agents/progress/decisions-YYYY-MM-DD.md
  temp: .agents/work/

user_mirror:
  dir: .users/ko/context/
  sync: manual
  note: docs/는 SoT, .users/ko/context/는 보조 mirror.
